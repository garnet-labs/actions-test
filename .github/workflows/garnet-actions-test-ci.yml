name: Garnet actions-test CI
on:
  workflow_dispatch:
jobs:
  dep-install:
    name: Dependency Install (Garnet)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Garnet Runtime Visibility
        uses: garnet-org/action@v2
        with:
          api_token: ${{ secrets.GARNET_API_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: |
          pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f pyproject.toml ]; then pip install -e ".[dev]" || pip install -e . || true; fi
          if [ -f setup.py ]; then pip install -e . || true; fi
          pip list | head -60
